server:
  port: 8081 # Running port of the inventory (product) service

spring:
  application:
    # Registered in Eureka as PRODUCT-SERVICE — matches the API Gateway route (lb://PRODUCT-SERVICE)
    name: product-service

  datasource:
    # Host 'localhost' + host port '5432' map to the PostgreSQL container in docker-compose.yml
    url: ${DB_URL:jdbc:postgresql://localhost:5432/devicelk_inventory}
    username: ${DB_USERNAME:devicelk_admin}
    password: ${DB_PASSWORD:devicelk_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' lets Hibernate create/evolve the schema automatically during development
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    # Register this service with the DeviceLK Service Discovery (Eureka) server
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
