server:
  port: 8081 # Running port of the inventory (product) service

grpc:
  server:
    port: 9090
    reflection-service-enabled: true

spring:
  application:
    # Registered in Eureka as PRODUCT-SERVICE — matches the API Gateway route (lb://PRODUCT-SERVICE)
    name: devicelk-inventory-service

  datasource:
    # Host 'localhost' + host port '5432' map to the PostgreSQL container in docker-compose.yml
    url: ${DB_URL:jdbc:postgresql://localhost:5433/devicelk_inventory}
    username: ${DB_USERNAME:devicelk_admin}
    password: ${DB_PASSWORD:devicelk_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' lets Hibernate create/evolve the schema automatically during development
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    health-check-url-path: /actuator/health
    status-page-url-path: /actuator/info
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
